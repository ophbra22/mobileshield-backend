services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mobileshield
      POSTGRES_USER: mobileshield
      POSTGRES_PASSWORD: mobileshield
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobileshield -d mobileshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://mobileshield:mobileshield@db:5432/mobileshield
      ADMIN_TOKEN: change-me-now
      ENABLE_ADMIN: "false"
      RATE_LIMIT_PER_MINUTE: 60
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./mobileshield-web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pg_data:
